workflows:
  ios-simulator:
    name: iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - eist_secrets
      node: 20
      xcode: "16"
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/ios/Pods
    scripts:
      - name: Install dependencies
        script: npm ci --prefer-offline --no-audit

      - name: Generate native project
        script: npx expo prebuild --platform ios --non-interactive --no-install

      - name: Install pods
        script: |
          cd ios
          # Prefer deterministic install; fall back when lockfile drift requires regeneration.
          pod install --deployment || pod install

      - name: Build iOS Simulator app
        script: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/.xcworkspace//')
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -destination 'generic/platform=iOS Simulator' \
            -parallelizeTargets \
            -jobs $(sysctl -n hw.ncpu) \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare artifact
        script: |
          cd ios/build/Build/Products/Release-iphonesimulator
          APP_NAME=$(ls -d *.app | head -1)
          zip -r ~/eist-app-simulator.zip "$APP_NAME"

      - name: Upload to Appetize.io
        script: |
          RESPONSE=$(curl -s -X POST \
            -H "X-API-KEY: $APPETIZE_API_KEY" \
            -F "file=@$HOME/eist-app-simulator.zip" \
            -F "platform=ios" \
            "https://api.appetize.io/v1/apps/obxdfeiujvbclltt4rtklu3jbi")
          echo "Appetize response: $RESPONSE"
          PUBLIC_KEY=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('publicKey',''))")
          echo "Appetize URL: https://appetize.io/app/$PUBLIC_KEY"

    artifacts:
      - ~/eist-app-simulator.zip
